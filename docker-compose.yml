version: '3.8'

services:

  postgres:
    image: postgres:17
    container_name: postgres_db_v2
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: 
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - event-network

  inventory-service:
    image: darshanar28/inventory-service-v2:latest
    container_name: inventory_service_v2
    restart: always
    ports:
      - "${INVENTORY_SERVICE_PORT}:5001"
    environment:
      SERVER_PORT: ${INVENTORY_SERVICE_PORT}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${INVENTORY_DB}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      - postgres
    networks:
      - event-network

  event-service:
    image: darshanar28/event-service-v2:latest
    container_name: event_service_v2
    restart: always
    ports:
      - "${EVENT_SERVICE_PORT}:5000"
    environment:
      SERVER_PORT: ${EVENT_SERVICE_PORT}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${EVENT_DB}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      - postgres
    networks:
      - event-network

  chatbot-service:
    image: darshanar28/chatbot-service-v2:latest
    container_name: chatbot_service_v2
    restart: always
    ports:
      - "${CHATBOT_SERVICE_PORT}:5002"
    environment:
      SERVER_PORT: ${CHATBOT_SERVICE_PORT}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL}
    depends_on:
      - event-service
    networks:
      - event-network

  frontend:
    image: darshanar28/frontend-v2:latest
    container_name: frontend_app_v2
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - event-service
      - inventory-service
    networks:
      - event-network

networks:
  event-network:
    driver: bridge

volumes:
  postgres-data: