version: '3.8'

services:

  postgres:
    image: postgres:17
    container_name: postgres_db_v2
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ardp28}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root28}
    ports: 
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - event-network

    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ardp28}"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    image: darshanar28/inventory-service-v2:latest
    container_name: inventory_service_v2
    restart: always
    ports:
      - "${INVENTORY_SERVICE_PORT:-5001}:5001"
    environment:
      SERVER_PORT: ${INVENTORY_SERVICE_PORT:-5001}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${INVENTORY_DB:-inventory_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-ardp28}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root28}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event-network

  event-service:
    image: darshanar28/event-service-v2:latest
    container_name: event_service_v2
    restart: always
    ports:
      - "${EVENT_SERVICE_PORT:-5000}:5000"
    environment:
      SERVER_PORT: ${EVENT_SERVICE_PORT:-5000}

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${EVENT_DB:-event_management_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-ardp28}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root28}

      JWT_SECRET: ${JWT_SECRET:-MySuperSecureJwtSecretKeyThatIsAtLeast32Chars}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - event-network

  chatbot-service:
    image: darshanar28/chatbot-service-v2:latest
    container_name: chatbot_service_v2
    restart: always
    ports:
      - "${CHATBOT_SERVICE_PORT:-5002}:5002"
    environment:
      SERVER_PORT: ${CHATBOT_SERVICE_PORT:-5002}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL:-http://event-service:5000}
    depends_on:
      event-service:
        condition: service_started
    networks:
      - event-network

  frontend:
    image: darshanar28/frontend-v2:latest
    container_name: frontend_app_v2
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - event-service
      - inventory-service
    networks:
      - event-network

networks:
  event-network:
    driver: bridge

volumes:
  postgres-data: