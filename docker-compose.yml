version: '3.8'

services:

  postgres:
    image: postgres:17
    container_name: postgres_db_v2
    restart: always
    environment:
      POSTGRES_USER: ardp28
      POSTGRES_PASSWORD: root28
    ports: 
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - event-network

  inventory-service:
    image: darshanar28/inventory-service-v2:latest
    container_name: inventory_service_v2
    restart: always
    ports:
      - "5001:5001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: ardp28
      SPRING_DATASOURCE_PASSWORD: root28
    depends_on:
      - postgres
    networks:
      - event-network

  event-service:
    image: darshanar28/event-service-v2:latest
    container_name: event_service_v2
    restart: always
    ports:
      - "5000:5000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_management_db
      SPRING_DATASOURCE_USERNAME: ardp28
      SPRING_DATASOURCE_PASSWORD: root28
    depends_on:
      - postgres
    networks:
      - event-network

  chatbot-service:
    image: darshanar28/chatbot-service-v2:latest
    container_name: chatbot_service_v2
    restart: always
    ports:
      - "5002:5002"
    environment:
      EVENT_SERVICE_URL: http://event-service:5000
    depends_on:
      - event-service
    networks:
      - event-network

  frontend:
    image: darshanar28/frontend-v2:latest
    container_name: frontend_app_v2
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - event-service
      - inventory-service
    networks:
      - event-network

networks:
  event-network:
    driver: bridge

volumes:
  postgres-data: