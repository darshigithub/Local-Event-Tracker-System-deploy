global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'event-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['event-service:5000']

  - job_name: 'inventory-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['inventory-service:5001']

  - job_name: 'chatbot-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['chatbot-service:5002']